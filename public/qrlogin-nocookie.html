<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>дәҢз»ҙз Ғзҷ»еҪ•</title>
  <script src="/static/speed-insights.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 48px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    .qr-wrapper {
      display: inline-block;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    #qrImg {
      width: 200px;
      height: 200px;
      display: block;
    }

    .info {
      text-align: left;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #666;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    .status.waiting {
      background: #fef3c7;
      color: #92400e;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>дәҢз»ҙз Ғзҷ»еҪ•</h1>
    <p class="subtitle">дҪҝз”ЁзҪ‘жҳ“дә‘йҹід№җAppжү«жҸҸдәҢз»ҙз Ғзҷ»еҪ•</p>

    <div class="qr-wrapper">
      <img id="qrImg" src="" alt="дәҢз»ҙз ҒеҠ иҪҪдёӯ..." />
    </div>

    <div id="status" class="status waiting">зӯүеҫ…жү«жҸҸ...</div>

    <div id="info" class="info"></div>

    <p class="hint">иҜ·жү“ејҖзҪ‘жҳ“дә‘йҹід№җAppпјҢжү«жҸҸдёҠж–№дәҢз»ҙз Ғе®ҢжҲҗзҷ»еҪ•</p>
  </div>

  <script src="https://fastly.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
  <script>
    async function login() {
      let timer
      const statusDiv = document.getElementById('status')
      const cookie = localStorage.getItem('cookie')

      updateStatus('еҠ иҪҪдәҢз»ҙз Ғ...', 'waiting')
      getLoginStatus(cookie)

      try {
        const res = await axios({
          url: `/login/qr/key?timestamp=${Date.now()}`,
        })
        const key = res.data.data.unikey

        const res2 = await axios({
          url: `/login/qr/create?key=${key}&platform=web&qrimg=true&timestamp=${Date.now()}`,
        })
        document.querySelector('#qrImg').src = res2.data.data.qrimg
        updateStatus('иҜ·жү«жҸҸдәҢз»ҙз Ғ', 'waiting')

        timer = setInterval(async () => {
          const statusRes = await checkStatus(key)
          if (statusRes.code === 800) {
            updateStatus('дәҢз»ҙз Ғе·ІиҝҮжңҹпјҢиҜ·еҲ·ж–°йЎөйқў', 'error')
            clearInterval(timer)
          } else if (statusRes.code === 801) {
            updateStatus('дәҢз»ҙз Ғе·Іжү«жҸҸпјҢиҜ·еңЁжүӢжңәдёҠзЎ®и®Ө', 'waiting')
          } else if (statusRes.code === 802) {
            updateStatus('зҷ»еҪ•жҲҗеҠҹпјҢжӯЈеңЁдҝқеӯҳдҝЎжҒҜ...', 'waiting')
          } else if (statusRes.code === 803) {
            clearInterval(timer)
            updateStatus('жҺҲжқғзҷ»еҪ•жҲҗеҠҹпјҒ', 'success')
            await getLoginStatus(statusRes.cookie)
            localStorage.setItem('cookie', statusRes.cookie)
          }
        }, 3000)
      } catch (error) {
        console.error('зҷ»еҪ•еӨұиҙҘ:', error)
        updateStatus('дәҢз»ҙз ҒеҠ иҪҪеӨұиҙҘпјҢиҜ·еҲ·ж–°йЎөйқўйҮҚиҜ•', 'error')
      }
    }

    async function checkStatus(key) {
      const res = await axios({
        url: `/login/qr/check?key=${key}&timestamp=${Date.now()}&noCookie=true`,
      })
      return res.data
    }

    async function getLoginStatus(cookie = '') {
      try {
        const res = await axios({
          url: `/login/status?timestamp=${Date.now()}`,
          method: 'post',
          data: {
            cookie,
          },
        })
        document.querySelector('#info').textContent = JSON.stringify(res.data, null, 2)
      } catch (error) {
        console.error('иҺ·еҸ–зҷ»еҪ•зҠ¶жҖҒеӨұиҙҘ:', error)
      }
    }

    function updateStatus(message, type) {
      const statusDiv = document.getElementById('status')
      statusDiv.textContent = message
      statusDiv.className = 'status ' + type
    }

    login()
  </script>
</body>

</html>
